version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tourism-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tourism_db
      POSTGRES_USER: tourism_user
      POSTGRES_PASSWORD: tourism_password
    volumes:
      - tourism_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourism_user -d tourism_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tourism_postgres_data:
